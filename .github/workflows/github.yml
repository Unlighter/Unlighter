name: Update README

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update timestamp in README
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s|<!--LAST_UPDATED-->.*|<!--LAST_UPDATED--> Last updated: $DATE|" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update README timestamp"
          git pull --rebase origin main
          git push
